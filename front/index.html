<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faceit jeje</title>
    <link rel="stylesheet" href="dist/css/style.css">
</head>
<body>

    <header class="head">
        <div class="logo-box">
            <img src="https://i.postimg.cc/prQ87y9v/image.png" alt="Logo">
        </div>
        <div class="head-links">
            <a href="index.html">index</a>
            <a href="dist/paginas/institucion.html">institucional</a>
            <a href="https://www.youtube.com/@Faceit" target="_blank">youtube</a>
        </div>
    </header>

    <main>
    <div class="ranking">
        <div class="ranking-img">
            <img src="https://i.postimg.cc/FKmKWGyW/image.png" alt="Ranking Image">
        </div>
        <div class="ranking-text">
            <h1>Rankings</h1>
            <p>Tenemos ranking por elo y niveles, mas elo = nivel mas alto, competi contra los mejores y volvete uno!</p>
        </div>
    </div>

    <div class="hero-img">
        <img src="https://scope.gg/guides/content/images/2023/12/faceit-ru-10-1.png" alt="Hero img">
    </div>

    <div class="form">
        <h2>FORMULARIO</h2>
        <div class="form-box">
            <form>
                <div class="inputs">
                    <label>Nombre In-Game</label>
                    <input type="text" placeholder="IGN" required>
                </div>
                <div class="inputs">
                    <label>Elo</label>
                    <input type="number" placeholder="Elo" required>
                </div>
                <div class="btn-container">
                    <button type="submit" class="btn-submit">ENVIAR</button>
                </div>
            </form>
        </div>
    </div>
</main>

    <footer>
        <div class="footer-logo">
            <img src="https://pbs.twimg.com/profile_images/1961427680273846272/izkfeb3p_400x400.jpg" alt="Footer Logo">
        </div>
        <div class="footer-links">
            <div class="columna">
                <a href="https://support.faceit.com/hc/en-us">soporte</a>
                <a href="https://www.faceit.com/en/anti-cheat">anti cheat</a>
                <a href="https://www.faceit.com/en/news">noticias</a>
            </div>
            <div class="columna">
                <a href="https://corporate.faceit.com/privacy/">politica de privacidad</a>
                <a href="https://corporate.faceit.com/">sobre nosotros</a>
                <a href="https://corporate.faceit.com/working-at-faceit/">trabaja con nosotros</a>
            </div>
        </div>
    </footer>

</body>
</html>
